server.port=8080
server.servlet.context-path=/ledger

# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:eventledger;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA — schema controlled via schema.sql, not Hibernate DDL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# SQL initialisation
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Springdoc / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# Jackson — use snake_case for all JSON fields globally.
# Jackson derives property names from public getters/setters, not private fields,
# so @JsonProperty on private fields is silently ignored. The naming strategy
# converts getter-derived camelCase names (e.g. getEventId → eventId) to
# snake_case (event_id) for both serialization and deserialization automatically.
spring.jackson.property-naming-strategy=SNAKE_CASE
